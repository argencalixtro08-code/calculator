<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            background-color: black;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        #welcome {
            color: hotpink;
            margin-bottom: 10px;
            font-size: 18px;
            text-align: center;
        }

        .calculator {
            background: #111;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 20px hotpink;
            width: 260px;
        }

        .display {
            width: 100%;
            height: 50px;
            background: #222;
            color: white;
            text-align: right;
            font-size: 22px;
            border: none;
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            height: 45px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .num {
            background: white;
            color: black;
        }

        .op {
            background: hotpink;
            color: white;
        }

        .equal {
            grid-column: span 2;
            background: hotpink;
            color: white;
            font-size: 20px;
        }

        .info {
            grid-column: span 2;
            background: pink;
            color: black;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div id="Calculator"></div>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="op" onclick="clearDisplay()">C</button>
        <button class="op" onclick="deleteLast()">DEL</button>
        <button class="op" onclick="press('%')">%</button>
        <button class="op" onclick="press('/')">/</button>

        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="op" onclick="press('*')">*</button>

        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="op" onclick="press('-')">-</button>

        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>
        <button class="op" onclick="press('+')">+</button>

        <button class="num" onclick="press('0')">0</button>
        <button class="num" onclick="press('.')">.</button>

        <button class="equal" onclick="calculate()">=</button>

        <button class="info" onclick="showInfo('A')">A</button>
        <button class="info" onclick="showInfo('B')">B</button>
    </div>
</div>

<script>
    // FIXED AUTO OUTPUT
    window.onload = function () {
        document.getElementById("welcome").innerText = "Calculator 💖";
    };

    function press(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function deleteLast() {
        let current = document.getElementById("display").value;
        document.getElementById("display").value = current.slice(0, -1);
    }

    function calculate() {
        try {
            document.getElementById("display").value =
                eval(document.getElementById("display").value);
        } catch {
            alert("Error");
        }
    }

    function showInfo(choice) {
        if (choice === "A") {
            alert("Developer: Argen T. Calixtro");
        } else if (choice === "B") {
            alert("Application: Simple Black & Pink Calculator");
        }
    }
</script>

</body>
</html>
